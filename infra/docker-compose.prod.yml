services:
  actual:
    image: ghcr.io/pdnn/actual-server:edge
    container_name: actual-budget
    restart: always
    # Non-sensitive config — versioned here. Sensitive secrets in .env via Secret Manager.
    environment:
      ACTUAL_PORT: "5006"
      ACTUAL_DATA_DIR: /data
      ACTUAL_LOGIN_METHOD: openid
      ACTUAL_OPENID_AUTH_METHOD: oauth2
      ACTUAL_OPENID_PROVIDER_NAME: Google
      ACTUAL_OPENID_DISCOVERY_URL: https://accounts.google.com/.well-known/openid-configuration
      ACTUAL_OPENID_SERVER_HOSTNAME: https://actual-financas.fglivraria.com
      ACTUAL_TOKEN_EXPIRATION: never
    env_file:
      - .env
    ports:
      - "5006:5006"
    volumes:
      - /opt/actual/data:/data
    networks:
      - actual-net
    deploy:
      resources:
        limits:
          memory: 384M
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:5006').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/actual/caddy_data:/data
      - /opt/actual/caddy_config:/config
    networks:
      - actual-net
    depends_on:
      actual:
        condition: service_healthy

networks:
  actual-net:
    driver: bridge
