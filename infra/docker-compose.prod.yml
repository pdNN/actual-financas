services:
  actual:
    image: ghcr.io/pdnn/actual-server:edge
    container_name: actual-budget
    restart: always
    env_file:
      - .env
    ports:
      - "5006:5006"
    volumes:
      - /opt/actual/data:/data
    networks:
      - actual-net
    deploy:
      resources:
        limits:
          memory: 384M
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:5006').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/actual/caddy_data:/data
      - /opt/actual/caddy_config:/config
    networks:
      - actual-net
    depends_on:
      actual:
        condition: service_healthy

networks:
  actual-net:
    driver: bridge
